<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Màn Hình Máy Chiếu</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            text-align: center;
            padding: 20px;
            margin: 0;
            cursor: pointer;
        }

        .container {
            max-width: 98%;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            min-height: 92vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        #audio-wakeup-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 20px;
            z-index: 9999;
            cursor: pointer;
            transition: 0.3s;
        }

        #audio-wakeup-overlay:hover {
            background: rgba(0, 0, 0, 0.7);
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #eee;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        h1 {
            color: #2c3e50;
            margin: 0;
            font-size: 32px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .status {
            color: #e67e22;
            font-weight: bold;
            font-size: 18px;
            background: #fff3cd;
            padding: 8px 15px;
            border-radius: 50px;
        }

        .timer-text {
            font-size: 28px;
            font-weight: bold;
            color: #e74c3c;
            margin-bottom: 10px;
            display: none;
        }

        .timer-container {
            width: 100%;
            height: 25px;
            background-color: #ecf0f1;
            border-radius: 15px;
            display: none;
            border: 2px solid #bdc3c7;
            overflow: hidden;
        }

        .timer-bar {
            height: 100%;
            width: 100%;
            background-color: #2ecc71;
            transition: width 1s linear, background-color 0.5s ease;
        }

        .question-board {
            background-color: #e8f4f8;
            border: 3px solid #b3d4fc;
            border-radius: 15px;
            padding: 40px;
            margin-bottom: 25px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .q-text {
            font-size: 42px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 30px;
            line-height: 1.3;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            text-align: left;
        }

        .opt-box {
            background: white;
            padding: 25px;
            font-size: 32px;
            font-weight: bold;
            border-radius: 12px;
            border: 3px solid #bdc3c7;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
        }

        .opt-label {
            min-width: 60px;
            height: 60px;
            line-height: 60px;
            text-align: center;
            background: #34495e;
            color: white;
            border-radius: 50%;
            margin-right: 20px;
            font-size: 28px;
        }

        .student-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            padding-top: 20px;
            border-top: 3px dashed #bdc3c7;
            min-height: 100px;
        }

        .student-card {
            width: 140px;
            height: 90px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            padding: 6px;
            text-align: center;
            animation: popIn 0.3s ease-out;
            word-wrap: break-word;
            overflow: hidden;
            background-color: #f39c12;
            color: white;
            border: 3px solid #e67e22;
            transform: scale(1.05);
        }

        @keyframes popIn {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            100% {
                transform: scale(1.05);
                opacity: 1;
            }
        }

        .student-card.correct {
            background-color: #2ecc71;
            color: white;
            border-color: #27ae60;
            transform: scale(1.1);
            animation: none;
        }

        .student-card.incorrect {
            background-color: #e74c3c;
            color: white;
            border-color: #c0392b;
            transform: scale(0.95);
            animation: none;
        }

        #leaderboard-board {
            display: none;
            width: 100%;
            flex-direction: column;
            align-items: center;
            flex-grow: 1;
        }

        #leaderboard-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            width: 100%;
            margin-top: 20px;
        }

        .lb-card {
            width: 400px;
            padding: 18px 28px;
            border-radius: 15px;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
            border: 4px solid #bdc3c7;
            box-shadow: 0 6px 10px rgba(0, 0, 0, 0.1);
            transition: 0.3s;
        }

        .lb-card.top1 {
            background: #fffcf0;
            border-color: #f1c40f;
            color: #d35400;
            transform: scale(1.18);
            box-shadow: 0 10px 25px rgba(241, 196, 15, 0.4);
            z-index: 3;
        }

        .lb-card.top2 {
            background: #f8f9fa;
            border-color: #95a5a6;
            color: #7f8c8d;
            transform: scale(1.08);
            z-index: 2;
        }

        .lb-card.top3 {
            background: #fdf5e6;
            border-color: #d35400;
            color: #a04000;
            transform: scale(1.08);
            z-index: 2;
        }

        .lb-name {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 250px;
            text-align: left;
        }

        .lb-score {
            background: #2c3e50;
            color: white;
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 22px;
        }

        .lb-card.top1 .lb-score {
            background: #f39c12;
        }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>

<body>
    <div class="container">
        <div id="audio-wakeup-overlay">
            <span style="font-size: 100px; margin-bottom: 20px;">🔊</span>
            <div style="font-size: 40px; font-weight: bold;">MÀN HÌNH TƯƠNG TÁC LỚP HỌC</div>
            <div style="font-size: 24px; margin-top: 15px; color: #f1c40f;">Nhấp chuột bất kỳ vào đây để BẬT LOA</div>
        </div>

        <div class="header-bar">
            <h1 id="room-title">📊 Màn Hình Tương Tác</h1>
            <div class="status" id="connection-status">⏳ Đang kết nối...</div>
        </div>

        <div class="timer-text" id="timer-text">⏳ Thời gian còn lại: <span id="time-left">0</span> giây</div>
        <div class="timer-container" id="timer-container">
            <div class="timer-bar" id="timer-bar"></div>
        </div>

        <div class="question-board" id="question-board">
            <div class="q-text" style="color: #7f8c8d;">
                🎯 SÂN CHƠI TRI THỨC ĐÃ SẴN SÀNG!<br>Hãy cầm chắc thẻ đáp án trên tay...
            </div>
        </div>

        <div class="student-grid" id="student-grid"></div>

        <div id="leaderboard-board">
            <h2 style="font-size: 50px; color: #8e44ad; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.1);">
                🏆 BẢNG VÀNG LỚP HỌC 🏆</h2>
            <div id="leaderboard-grid"></div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const roomCode = urlParams.get('room') || 'DEMO';
        document.getElementById('room-title').innerText = `📊 Phòng: ${roomCode}`;

        // ========================================================
        // [CỰC KỲ QUAN TRỌNG]: CHỐT CHẶN AN TOÀN BẢO MẬT
        // ========================================================
        // Biến này để đảm bảo Máy chiếu CHỈ ĐƯỢC PHÉP gửi dữ liệu hỗ trợ điện thoại 
        // NẾU VÀ CHỈ NẾU nó đã nhận được gói dữ liệu TƯƠI MỚI từ Hệ sinh thái Mẹ hoặc Thủ kho.
        let hasReceivedFreshData = false;

        // Lắng nghe gói dữ liệu Mẹ ném sang khi vừa mở Tab mới
        window.addEventListener('message', (event) => {
            if (event.data && event.data.action === 'LOAD_LESSON') {
                const data = event.data.lessonData;
                if (data) {
                    hasReceivedFreshData = true; // Kích hoạt cờ an toàn
                    if (data.questions) localStorage.setItem('quiz_questions', JSON.stringify(data.questions));
                    if (data.classes) localStorage.setItem('quiz_class', JSON.stringify(data.classes));
                    console.log("✅ Máy chiếu đã nhận bài học siêu tươi từ Hệ sinh thái Mẹ!");

                    // Lúc này mới được phép cập nhật lên Server
                    const fresh = getFreshData();
                    socket.emit('sync_data_to_phone', { room: roomCode, questions: fresh.questions, students: fresh.students });
                }
            }
        });

        // Hú Mẹ xin bài học (nếu có)
        setTimeout(() => {
            if (window.opener) window.opener.postMessage({ action: 'REQUEST_LESSON' }, '*');
            else if (window.parent !== window) window.parent.postMessage({ action: 'REQUEST_LESSON' }, '*');
        }, 1000);

        function getFreshData() {
            return {
                questions: JSON.parse(localStorage.getItem('quiz_questions')) || [],
                students: JSON.parse(localStorage.getItem('quiz_class')) || []
            };
        }

        let studentSubmissions = {};
        let countdownInterval;

        const audioTinhGio = new Audio('/tinh-gio-choi.mp3'); audioTinhGio.loop = true;
        const audioHetGio = new Audio('/hetgio.mp3');
        const audioChucMung = new Audio('/chucmung.mp3');
        const audioTip = new Audio('data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YU' + Array(200).join('A'));

        function stopAllAudio() { audioTinhGio.pause(); audioTinhGio.currentTime = 0; audioHetGio.pause(); audioHetGio.currentTime = 0; audioChucMung.pause(); audioChucMung.currentTime = 0; }

        document.getElementById('audio-wakeup-overlay').addEventListener('click', function () {
            this.style.opacity = '0'; this.style.visibility = 'hidden'; console.log("Hệ thống âm thanh đã sẵn sàng!");
            audioTip.play().catch(e => { });
        });

        function getStudentLabel(id) {
            const freshClass = getFreshData().students;
            if (freshClass[id - 1]) return freshClass[id - 1];
            return `ID: ${id}`;
        }

        const socket = io();

        socket.on('connect', () => {
            document.getElementById('connection-status').innerHTML = "🟢 Đã kết nối!";
            socket.emit('join_room', roomCode);

            // XÓA BỎ HOÀN TOÀN TÍNH NĂNG TỰ GỬI DỮ LIỆU Ở ĐÂY ĐỂ TRÁNH GHI ĐÈ
        });

        socket.on('device_joined', () => {
            // [BẢO VỆ CHỐNG TẨY NÃO ĐIỆN THOẠI]: 
            // Chỉ gửi dữ liệu nếu Máy chiếu chắc chắn bản thân đang cầm bản dữ liệu mới nhất
            if (hasReceivedFreshData) {
                console.log("Phát hiện điện thoại vào phòng, đang lấy dữ liệu xịn đồng bộ...");
                const fresh = getFreshData();
                socket.emit('sync_data_to_phone', { room: roomCode, questions: fresh.questions, students: fresh.students });
            } else {
                console.log("Phát hiện điện thoại, nhưng Máy chiếu chưa có dữ liệu TƯƠI nên không gửi để tránh ghi đè.");
            }
        });

        // Lắng nghe dữ liệu từ Server Thủ Kho ném xuống
        socket.on('receive_sync_data', (data) => {
            if (data && data.questions && data.questions.length > 0) {
                hasReceivedFreshData = true; // Kích hoạt cờ an toàn vì dữ liệu từ Server là dữ liệu chuẩn
                localStorage.setItem('quiz_questions', JSON.stringify(data.questions));
                localStorage.setItem('quiz_class', JSON.stringify(data.students));
                console.log("📦 Máy chiếu đã cập nhật dữ liệu TƯƠI từ Thủ Kho Server!");
            }
        });

        socket.on('update_projector', (data) => {
            const studentId = data.studentId;
            if (studentSubmissions[studentId]) {
                studentSubmissions[studentId] = data.answer;
                return;
            }

            studentSubmissions[studentId] = data.answer;
            audioTip.play().catch(e => { });

            const grid = document.getElementById('student-grid');
            const card = document.createElement('div');
            card.className = 'student-card';
            card.id = `student-${studentId}`;
            card.innerText = `${getStudentLabel(studentId)}\n✔️`;
            grid.appendChild(card);
        });

        socket.on('execute_command', (data) => {
            // Nếu điện thoại hú xin đồng bộ
            if (data.action === 'request_sync') {
                // Máy chiếu CHỈ ĐƯỢC TRẢ LỜI ĐIỆN THOẠI nếu nó cầm dữ liệu thật sự tươi
                if (hasReceivedFreshData) {
                    const fresh = getFreshData();
                    if (fresh.questions.length > 0 || fresh.students.length > 0) {
                        socket.emit('sync_data_to_phone', { room: roomCode, questions: fresh.questions, students: fresh.students });
                    }
                }
            }

            if (data.action !== 'show_leaderboard' && data.action !== 'request_sync') {
                document.getElementById('leaderboard-board').style.display = 'none';
                document.getElementById('question-board').style.display = 'flex';
                document.getElementById('student-grid').style.display = 'flex';
            }

            if (data.action === 'start_timer') {
                clearInterval(countdownInterval); stopAllAudio(); audioTinhGio.play().catch(e => { });
                let timeLeft = data.duration;
                document.getElementById('timer-container').style.display = 'block';
                document.getElementById('timer-text').style.display = 'block';
                document.getElementById('time-left').innerText = timeLeft;
                document.getElementById('timer-bar').style.width = '100%';
                document.getElementById('timer-bar').style.backgroundColor = '#2ecc71';

                countdownInterval = setInterval(() => {
                    timeLeft--; document.getElementById('time-left').innerText = timeLeft;
                    document.getElementById('timer-bar').style.width = (timeLeft / data.duration * 100) + '%';
                    if (timeLeft <= 5) document.getElementById('timer-bar').style.backgroundColor = '#e74c3c';
                    if (timeLeft <= 0) { clearInterval(countdownInterval); stopAllAudio(); audioHetGio.play().catch(e => { }); }
                }, 1000);
            }

            if (data.action === 'show_question') {
                stopAllAudio(); clearInterval(countdownInterval);
                document.getElementById('timer-container').style.display = 'none'; document.getElementById('timer-text').style.display = 'none';

                studentSubmissions = {};
                document.getElementById('student-grid').innerHTML = '';

                const q = data.questionData;
                let opts = `<div class="opt-box"><span class="opt-label">A</span> <div>${q.options.A}</div></div><div class="opt-box"><span class="opt-label">B</span> <div>${q.options.B}</div></div>`;
                if (q.type !== 'tf') opts += `<div class="opt-box"><span class="opt-label">C</span> <div>${q.options.C}</div></div><div class="opt-box"><span class="opt-label">D</span> <div>${q.options.D}</div></div>`;
                document.getElementById('question-board').innerHTML = `<div class="q-text">${q.text}</div><div class="options-grid">${opts}</div>`;
                renderMathInElement(document.getElementById('question-board'), { delimiters: [{ left: '$$', right: '$$', display: true }, { left: '$', right: '$', display: false }] });
            }

            if (data.action === 'reveal') {
                clearInterval(countdownInterval); stopAllAudio(); audioChucMung.play().catch(e => { });

                for (const [id, ans] of Object.entries(studentSubmissions)) {
                    const c = document.getElementById(`student-${id}`);
                    if (!c) continue;
                    if (ans === data.correctAnswer) {
                        c.className = 'student-card correct';
                        c.innerText = `${getStudentLabel(id)}\n${ans}`;
                    }
                    else {
                        c.className = 'student-card incorrect';
                        c.innerText = `${getStudentLabel(id)}\n${ans}`;
                    }
                }
            }

            if (data.action === 'show_leaderboard') {
                stopAllAudio(); audioChucMung.play().catch(e => { });
                document.getElementById('question-board').style.display = 'none'; document.getElementById('student-grid').style.display = 'none';
                document.getElementById('timer-container').style.display = 'none'; document.getElementById('timer-text').style.display = 'none';

                document.getElementById('leaderboard-board').style.display = 'flex';
                const lbGrid = document.getElementById('leaderboard-grid'); lbGrid.innerHTML = '';

                data.leaderboard.forEach((student, index) => {
                    if (student.score === 0 && index > 2) return;
                    const card = document.createElement('div'); card.className = 'lb-card';
                    let rankIcon = `#${index + 1}`;
                    if (index === 0 && student.score > 0) { card.classList.add('top1'); rankIcon = '🥇'; } else if (index === 1 && student.score > 0) { card.classList.add('top2'); rankIcon = '🥈'; } else if (index === 2 && student.score > 0) { card.classList.add('top3'); rankIcon = '🥉'; }

                    card.innerHTML = `<div style="display:flex; align-items:center; gap:10px;"><span style="font-size:32px;">${rankIcon}</span><span class="lb-name">${getStudentLabel(student.id)}</span></div><span class="lb-score">${student.score} Điểm</span>`;
                    lbGrid.appendChild(card);
                });
            }
        });
    </script>
</body>

</html>
