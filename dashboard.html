<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Soạn Đề - Local Storage</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            padding: 20px;
            margin: 0;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            color: #8e44ad;
        }

        .main-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            max-width: 98%;
            margin: 0 auto;
        }

        .panel {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .editor-panel {
            flex: 1.5;
            min-width: 350px;
        }

        .preview-panel {
            flex: 1;
            min-width: 350px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            font-weight: bold;
            margin-bottom: 5px;
            display: block;
        }

        input[type="text"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #bdc3c7;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .btn {
            padding: 10px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            color: white;
            width: 100%;
            margin-bottom: 5px;
        }

        .btn-primary {
            background-color: #3498db;
        }

        .btn-success {
            background-color: #2ecc71;
        }

        .btn-warning {
            background-color: #f39c12;
        }

        .btn-excel {
            background-color: #107c41;
        }

        .excel-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        #live-preview {
            background: #ecf0f1;
            padding: 15px;
            border-radius: 8px;
            border: 2px dashed #bdc3c7;
        }

        .question-list {
            list-style: none;
            padding: 0;
            max-height: 250px;
            overflow-y: auto;
        }

        .q-item {
            background: #f9f9f9;
            padding: 10px;
            border: 1px solid #ddd;
            margin-bottom: 5px;
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <div class="header">
        <h2>⚙️ STUDIO SOẠN ĐỀ (LƯU CỤC BỘ)</h2>
        <p style="color:#e67e22; font-weight:bold;">Dữ liệu tự động lưu an toàn trên máy tính của bạn!</p>
    </div>

    <div class="main-grid">
        <div class="editor-panel panel">
            <h3>📝 Soạn Câu Hỏi</h3>
            <input type="hidden" id="edit-id">
            <div class="form-group" style="display: flex; gap: 15px;">
                <div style="flex:1"><label>Loại:</label><select id="q-type">
                        <option value="4opts">4 Đáp án</option>
                        <option value="tf">Đúng/Sai</option>
                    </select></div>
                <div style="flex:1"><label>Đ/Án Đúng:</label><select id="q-correct">
                        <option value="A">A</option>
                        <option value="B">B</option>
                        <option value="C">C</option>
                        <option value="D">D</option>
                    </select></div>
            </div>
            <div class="form-group"><label>Nội dung:</label><textarea id="q-text" rows="3"></textarea></div>
            <div class="form-group"><label>A:</label><input type="text" id="opt-A"> <label>B:</label><input type="text"
                    id="opt-B"> <label>C:</label><input type="text" id="opt-C"> <label>D:</label><input type="text"
                    id="opt-D"></div>
            <button class="btn btn-primary" id="btn-save">💾 LƯU CÂU HỎI VÀO BỘ NHỚ MÁY</button>
            <button class="btn btn-warning" id="btn-clear">LÀM MỚI FORM</button>
        </div>

        <div class="preview-panel">
            <div class="panel">
                <h3>📚 Ngân Hàng Câu Hỏi</h3>
                <ul class="question-list" id="q-list"></ul>
                <div class="excel-group">
                    <button class="btn btn-excel" onclick="exportQuestionsExcel()">📥 Xuất Excel Câu Hỏi</button>
                    <input type="file" id="import-q-file" style="display:none" accept=".xlsx, .xls"
                        onchange="importQuestionsExcel(event)">
                    <button class="btn btn-warning" onclick="document.getElementById('import-q-file').click()">📂 Nhập
                        từ Excel</button>
                </div>
            </div>

            <div class="panel">
                <h3>🧑‍🎓 Danh sách Lớp</h3>
                <textarea id="class-list" rows="4" placeholder="Nguyễn Văn A&#10;Trần Thị B..."></textarea>
                <button class="btn btn-success" onclick="saveClassList()">💾 LƯU DANH SÁCH LỚP</button>
                <div class="excel-group">
                    <button class="btn btn-excel" onclick="exportClassExcel()">📥 Xuất File Mẫu</button>
                    <input type="file" id="import-c-file" style="display:none" accept=".xlsx, .xls"
                        onchange="importClassExcel(event)">
                    <button class="btn btn-warning" onclick="document.getElementById('import-c-file').click()">📂 Nhập
                        Excel</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let questionBank = JSON.parse(localStorage.getItem('quiz_questions')) || [];
        let classList = JSON.parse(localStorage.getItem('quiz_class')) || [];

        window.onload = () => {
            renderQuestionList();
            document.getElementById('class-list').value = classList.join('\n');
        };

        function saveToStorage() {
            localStorage.setItem('quiz_questions', JSON.stringify(questionBank));
            renderQuestionList();
        }

        function saveClassList() {
            const text = document.getElementById('class-list').value;
            classList = text.split('\n').map(s => s.trim()).filter(s => s !== '');
            localStorage.setItem('quiz_class', JSON.stringify(classList));
            alert("Đã lưu danh sách lớp vào bộ nhớ máy!");
        }

        document.getElementById('btn-save').addEventListener('click', () => {
            const id = document.getElementById('edit-id').value;
            const q = {
                id: id || 'Q' + Date.now(), type: document.getElementById('q-type').value, text: document.getElementById('q-text').value,
                options: { A: document.getElementById('opt-A').value, B: document.getElementById('opt-B').value, C: document.getElementById('opt-C').value, D: document.getElementById('opt-D').value },
                correct: document.getElementById('q-correct').value
            };
            if (!q.text) return alert("Vui lòng nhập nội dung!");
            if (id) { const idx = questionBank.findIndex(x => x.id === id); if (idx > -1) questionBank[idx] = q; }
            else { questionBank.push(q); }
            saveToStorage(); document.getElementById('btn-clear').click();
        });

        document.getElementById('btn-clear').addEventListener('click', () => {
            document.getElementById('edit-id').value = ''; document.getElementById('q-text').value = '';
            document.getElementById('opt-A').value = ''; document.getElementById('opt-B').value = ''; document.getElementById('opt-C').value = ''; document.getElementById('opt-D').value = '';
        });

        function renderQuestionList() {
            const listEl = document.getElementById('q-list'); listEl.innerHTML = '';
            questionBank.forEach((q, index) => {
                const li = document.createElement('li'); li.className = 'q-item';
                li.innerHTML = `<b>Câu ${index + 1}:</b> ${q.text.substring(0, 30)}... (Đ/A: ${q.correct}) <button onclick="deleteQ('${q.id}')" style="float:right; color:red; cursor:pointer; border:none; background:none;">Xóa</button>`;
                listEl.appendChild(li);
            });
        }

        function deleteQ(id) {
            if (confirm("Bạn có chắc muốn xóa câu này?")) {
                questionBank = questionBank.filter(q => q.id !== id);
                saveToStorage();
            }
        }

        // ================= EXCEL CÂU HỎI =================
        function exportQuestionsExcel() {
            const data = questionBank.map((q, i) => ({
                "STT": i + 1, "Câu hỏi": q.text, "Đáp án A": q.options.A, "Đáp án B": q.options.B, "Đáp án C": q.options.C, "Đáp án D": q.options.D, "Đúng (A/B/C/D)": q.correct
            }));
            const ws = XLSX.utils.json_to_sheet(data.length ? data : [{ "STT": 1, "Câu hỏi": "Mẫu câu hỏi", "Đáp án A": "A", "Đáp án B": "B", "Đáp án C": "C", "Đáp án D": "D", "Đúng (A/B/C/D)": "A" }]);
            const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "CauHoi");
            XLSX.writeFile(wb, "NganHangCauHoi.xlsx");
        }

        function importQuestionsExcel(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function (evt) {
                const data = evt.target.result; const workbook = XLSX.read(data, { type: 'binary' });
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(sheet);
                rows.forEach(row => {
                    if (row["Câu hỏi"]) {
                        questionBank.push({
                            id: 'Q' + Date.now() + Math.random(), type: '4opts', text: row["Câu hỏi"],
                            options: { A: row["Đáp án A"] || '', B: row["Đáp án B"] || '', C: row["Đáp án C"] || '', D: row["Đáp án D"] || '' },
                            correct: row["Đúng (A/B/C/D)"]?.toUpperCase() || 'A'
                        });
                    }
                });
                saveToStorage(); alert("Đã nhập thành công từ Excel!");
                e.target.value = ""; // Reset input
            };
            reader.readAsBinaryString(file);
        }

        // ================= EXCEL DANH SÁCH LỚP =================
        function exportClassExcel() {
            const data = classList.length ? classList.map((n, i) => ({ "ID Thẻ": i + 1, "Họ và Tên": n })) : [{ "ID Thẻ": 1, "Họ và Tên": "Nguyễn Văn Mẫu" }];
            const ws = XLSX.utils.json_to_sheet(data); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "DanhSach");
            XLSX.writeFile(wb, "DanhSachLop.xlsx");
        }

        function importClassExcel(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function (evt) {
                const data = evt.target.result; const workbook = XLSX.read(data, { type: 'binary' });
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(sheet);
                let newClass = [];
                rows.forEach(row => { if (row["Họ và Tên"]) newClass.push(row["Họ và Tên"]); });
                if (newClass.length > 0) {
                    classList = newClass;
                    document.getElementById('class-list').value = classList.join('\n');
                    saveClassList();
                }
                e.target.value = "";
            };
            reader.readAsBinaryString(file);
        }
    </script>
</body>

</html>
