<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siêu Điều Khiển & Máy Quét - Quiz Paper Pro</title>

    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/jcmellado/js-aruco/src/cv.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/jcmellado/js-aruco/src/aruco.js"></script>
    <script src="/socket.io/socket.io.js"></script>

    <style>
        body {
            margin: 0;
            padding: 15px;
            background-color: #1e1e1e;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        #camera-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            border: 3px solid #4CAF50;
            border-radius: 8px;
            background-color: #000;
            overflow: hidden;
            margin-bottom: 15px;
        }

        #video {
            width: 100%;
            display: block;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .status-bar {
            padding: 10px;
            background-color: #333;
            border-radius: 5px;
            font-size: 14px;
            text-align: center;
            width: 100%;
            max-width: 500px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        .control-panel {
            background-color: #2c3e50;
            width: 100%;
            max-width: 500px;
            padding: 15px;
            border-radius: 10px;
            box-sizing: border-box;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .control-panel h3 {
            margin-top: 0;
            color: #f1c40f;
            text-align: center;
            font-size: 18px;
            border-bottom: 1px solid #34495e;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        select {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            background: #ecf0f1;
            color: #2c3e50;
            box-sizing: border-box;
        }

        .btn {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            margin-bottom: 10px;
            box-sizing: border-box;
            transition: 0.2s;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background-color: #3498db;
        }

        .btn-success {
            background-color: #2ecc71;
        }

        .btn-danger {
            background-color: #e74c3c;
        }

        .btn-warning {
            background-color: #f39c12;
        }

        .btn-purple {
            background-color: #8e44ad;
        }

        .btn-excel {
            background-color: #107c41;
            margin-bottom: 0;
        }

        .flex-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .flex-row input {
            width: 80px;
            padding: 10px;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            border-radius: 8px;
            border: none;
        }
    </style>
</head>

<body>

    <div id="camera-container">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
    </div>

    <div class="status-bar" id="status">Đang khởi động Camera...</div>

    <div class="control-panel">
        <h3>🎛️ TRUNG TÂM ĐIỀU KHIỂN</h3>

        <div class="form-group">
            <select id="question-select">
                <option value="">-- Đang tải Ngân hàng câu hỏi... --</option>
            </select>
        </div>

        <button class="btn btn-primary" id="btn-push">📺 1. BẮN CÂU HỎI LÊN BẢNG</button>

        <div class="flex-row">
            <input type="number" id="timer-duration" value="30">
            <button class="btn btn-warning" id="btn-start-timer" style="flex: 1; margin-bottom: 0;">▶ 2. BẮT ĐẦU TÍNH
                GIỜ</button>
        </div>

        <button class="btn btn-success" id="btn-reveal">🔍 3. CHẤM ĐIỂM (LẬT BÀI)</button>
        <button class="btn btn-purple" id="btn-leaderboard">🏆 4. HIỆN BẢNG XẾP HẠNG</button>
        <button class="btn btn-danger" id="btn-reset">🔄 XÓA BẢNG ĐỂ SANG CÂU MỚI</button>

        <hr style="border-color: #34495e; margin: 15px 0;">
        <button class="btn btn-excel" id="btn-export">📥 KẾT THÚC & XUẤT ĐIỂM EXCEL</button>
    </div>

    <script>
        const videoElement = document.getElementById('video');
        const canvasElement = document.getElementById('canvas');
        const context = canvasElement.getContext('2d', { willReadFrequently: true });
        const statusElement = document.getElementById('status');
        const socket = io();
        const lastScannedTime = {};
        let detector;

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        function playBeepSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.type = 'square'; oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.1);
            oscillator.connect(gainNode); gainNode.connect(audioCtx.destination);
            oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.1);
        }

        function getAnswerFromCorners(corners) {
            let cx = (corners[0].x + corners[1].x + corners[2].x + corners[3].x) / 4;
            let cy = (corners[0].y + corners[1].y + corners[2].y + corners[3].y) / 4;
            let dx = corners[0].x - cx; let dy = corners[0].y - cy;
            if (dx < 0 && dy < 0) return 'A'; if (dx > 0 && dy < 0) return 'B';
            if (dx > 0 && dy > 0) return 'C'; if (dx < 0 && dy > 0) return 'D'; return 'A';
        }

        async function startCamera() {
            try {
                const constraints = { video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } } };
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                videoElement.srcObject = stream;
                videoElement.addEventListener('loadedmetadata', () => {
                    canvasElement.width = videoElement.videoWidth; canvasElement.height = videoElement.videoHeight;
                    detector = new AR.Detector();
                    statusElement.innerText = "Camera sẵn sàng! Hãy chỉa vào thẻ của học sinh.";
                    statusElement.style.color = "#4CAF50";
                    requestAnimationFrame(scanFrame);
                });
            } catch (error) { statusElement.innerText = "Lỗi Camera!"; statusElement.style.color = "#FF5252"; }
        }

        function scanFrame() {
            if (videoElement.readyState === videoElement.HAVE_ENOUGH_DATA) {
                context.drawImage(videoElement, 0, 0, canvasElement.width, canvasElement.height);
                const imageData = context.getImageData(0, 0, canvasElement.width, canvasElement.height);
                const markers = detector.detect(imageData);
                if (markers.length > 0) {
                    drawMarkers(markers);
                    const now = Date.now();
                    for (let i = 0; i < markers.length; i++) {
                        let markerId = markers[i].id; let studentAnswer = getAnswerFromCorners(markers[i].corners);
                        if (!lastScannedTime[markerId] || now - lastScannedTime[markerId] > 500) {
                            socket.emit('scanned_answer', { studentId: markerId, answer: studentAnswer });
                            playBeepSound(); lastScannedTime[markerId] = now;
                        }
                    }
                }
            }
            requestAnimationFrame(scanFrame);
        }

        function drawMarkers(markers) {
            context.lineWidth = 4;
            for (let i = 0; i < markers.length; i++) {
                let corners = markers[i].corners;
                context.strokeStyle = "#FF3D00"; context.beginPath();
                for (let j = 0; j < corners.length; j++) {
                    let corner = corners[j]; context.moveTo(corner.x, corner.y);
                    let nextCorner = corners[(j + 1) % corners.length]; context.lineTo(nextCorner.x, nextCorner.y);
                }
                context.stroke(); context.closePath();
                context.strokeStyle = "#00E676"; context.strokeRect(corners[0].x - 4, corners[0].y - 4, 8, 8);
                let currentAnswer = getAnswerFromCorners(corners);
                context.fillStyle = "#FFEB3B"; context.font = "bold 30px Arial";
                context.fillText(`ID: ${markers[i].id} - [${currentAnswer}]`, corners[0].x, corners[0].y - 15);
            }
        }

        let questionBank = [];
        let activeQuestionOnBoard = null;
        let studentNamesList = [];
        let currentSubmissions = {};
        let sessionResults = {};
        let questionsAsked = [];

        window.onload = () => {
            startCamera();
            fetch('/api/questions')
                .then(res => res.json())
                .then(data => {
                    questionBank = data;
                    const selectEl = document.getElementById('question-select');
                    selectEl.innerHTML = '<option value="">-- Chọn câu hỏi để bắn lên Tivi --</option>';
                    data.forEach((q, index) => {
                        const opt = document.createElement('option');
                        opt.value = q.id;
                        opt.innerText = `Câu ${index + 1}: ${q.text.substring(0, 30)}... (Đ/án: ${q.correct})`;
                        selectEl.appendChild(opt);
                    });
                });
        };

        socket.on('execute_command', (data) => {
            if (data.action === 'update_class_list') {
                studentNamesList = data.students;
                alert("Đã nhận danh sách lớp từ máy tính. Sẵn sàng chấm điểm!");
            }
        });

        socket.on('update_projector', (data) => {
            currentSubmissions[data.studentId] = data.answer;
        });

        document.getElementById('btn-push').addEventListener('click', () => {
            const qId = document.getElementById('question-select').value;
            if (!qId) { alert("Vui lòng chọn 1 câu hỏi!"); return; }
            const q = questionBank.find(x => x.id === qId);
            activeQuestionOnBoard = q;
            currentSubmissions = {};
            socket.emit('teacher_command', { action: 'show_question', questionData: q });
        });

        document.getElementById('btn-start-timer').addEventListener('click', () => {
            if (!activeQuestionOnBoard) { alert("Phải bắn câu hỏi lên trước!"); return; }
            const duration = parseInt(document.getElementById('timer-duration').value);
            socket.emit('teacher_command', { action: 'start_timer', duration: duration });
        });

        document.getElementById('btn-reveal').addEventListener('click', () => {
            if (!activeQuestionOnBoard) { alert("Bạn chưa bắn câu hỏi!"); return; }
            if (!questionsAsked.find(q => q.id === activeQuestionOnBoard.id)) { questionsAsked.push(activeQuestionOnBoard); }

            const maxStudents = studentNamesList.length > 0 ? studentNamesList.length : 50;
            for (let i = 1; i <= maxStudents; i++) {
                if (!sessionResults[i]) sessionResults[i] = {};
                sessionResults[i][activeQuestionOnBoard.id] = currentSubmissions[i] || 'Chưa nộp';
            }
            socket.emit('teacher_command', { action: 'reveal', correctAnswer: activeQuestionOnBoard.correct });
        });

        // TÍNH NĂNG MỚI: TÍNH TOÁN VÀ GỬI BẢNG XẾP HẠNG LÊN MÁY CHIẾU
        document.getElementById('btn-leaderboard').addEventListener('click', () => {
            if (questionsAsked.length === 0) {
                alert("Bạn chưa chấm điểm câu hỏi nào! Không có dữ liệu xếp hạng.");
                return;
            }

            const leaderboard = [];
            const maxStudents = studentNamesList.length > 0 ? studentNamesList.length : 50;

            for (let i = 1; i <= maxStudents; i++) {
                let correctCount = 0;
                questionsAsked.forEach(q => {
                    if (sessionResults[i] && sessionResults[i][q.id] === q.correct) {
                        correctCount++;
                    }
                });

                // Chỉ hiển thị học sinh có tên thực hoặc đã được gán ID
                leaderboard.push({
                    id: i,
                    name: studentNamesList[i - 1] || `Học sinh ID: ${i}`,
                    score: correctCount
                });
            }

            // Sắp xếp điểm từ cao xuống thấp
            leaderboard.sort((a, b) => b.score - a.score);

            socket.emit('teacher_command', {
                action: 'show_leaderboard',
                leaderboard: leaderboard,
                totalQs: questionsAsked.length
            });
        });

        document.getElementById('btn-reset').addEventListener('click', () => {
            currentSubmissions = {};
            socket.emit('teacher_command', { action: 'reset' });
        });

        document.getElementById('btn-export').addEventListener('click', () => {
            if (questionsAsked.length === 0) { alert("Bạn chưa tổ chức thi câu nào!"); return; }
            const exportData = [];
            const maxStudents = studentNamesList.length > 0 ? studentNamesList.length : 50;

            for (let i = 1; i <= maxStudents; i++) {
                let row = { "ID Thẻ": i, "Họ và Tên": studentNamesList[i - 1] || `Học sinh ${i}` };
                let correctCount = 0;
                questionsAsked.forEach((q, index) => {
                    const studentAns = (sessionResults[i] && sessionResults[i][q.id]) ? sessionResults[i][q.id] : 'Không nộp';
                    row[`Câu ${index + 1} (Đ/A: ${q.correct})`] = studentAns;
                    if (studentAns === q.correct) correctCount++;
                });
                row["Tổng số câu Đúng"] = `${correctCount} / ${questionsAsked.length}`;
                row["Điểm Hệ 10"] = ((correctCount / questionsAsked.length) * 10).toFixed(1);
                exportData.push(row);
            }

            const worksheet = XLSX.utils.json_to_sheet(exportData);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Bang_Diem");
            XLSX.writeFile(workbook, `Bang_Diem_Lop_Hoc_${new Date().getTime()}.xlsx`);
        });
    </script>
</body>

</html>
