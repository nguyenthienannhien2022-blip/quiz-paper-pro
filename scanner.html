<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siêu Điều Khiển - Scanner</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/jcmellado/js-aruco/src/cv.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/jcmellado/js-aruco/src/aruco.js"></script>
    <script src="/socket.io/socket.io.js"></script>

    <style>
        body {
            margin: 0;
            padding: 15px;
            background-color: #1e1e1e;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #camera-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            border: 3px solid #4CAF50;
            border-radius: 8px;
            background-color: #000;
            overflow: hidden;
            margin-bottom: 15px;
        }

        #video {
            width: 100%;
            display: block;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .status-bar {
            padding: 10px;
            background-color: #333;
            border-radius: 5px;
            font-size: 14px;
            text-align: center;
            width: 100%;
            max-width: 500px;
            margin-bottom: 15px;
            transition: 0.3s;
            font-weight: bold;
        }

        .control-panel {
            background-color: #2c3e50;
            width: 100%;
            max-width: 500px;
            padding: 15px;
            border-radius: 10px;
            box-sizing: border-box;
        }

        .control-panel h3 {
            margin-top: 0;
            color: #f1c40f;
            text-align: center;
            font-size: 18px;
            border-bottom: 1px solid #34495e;
            padding-bottom: 10px;
        }

        select {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            background: #ecf0f1;
            margin-bottom: 15px;
        }

        .btn {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        .btn-primary {
            background-color: #3498db;
        }

        .btn-success {
            background-color: #2ecc71;
        }

        .btn-warning {
            background-color: #f39c12;
        }

        .btn-purple {
            background-color: #8e44ad;
        }

        .btn-excel {
            background-color: #107c41;
        }

        .flex-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .flex-row input {
            width: 80px;
            padding: 10px;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            border-radius: 8px;
            border: none;
        }
    </style>
</head>

<body>
    <div id="camera-container"><video id="video" autoplay playsinline></video><canvas id="canvas"></canvas></div>
    <div class="status-bar" id="status">Đang kết nối Phòng...</div>

    <div class="control-panel">
        <h3 id="room-title">🎛️ ĐIỀU KHIỂN</h3>
        <select id="question-select">
            <option value="">-- Đang đợi Laptop gửi câu hỏi... --</option>
        </select>
        <button class="btn btn-primary" id="btn-push">📺 1. BẮN CÂU HỎI LÊN BẢNG</button>
        <div class="flex-row">
            <input type="number" id="timer-duration" value="30">
            <button class="btn btn-warning" id="btn-start-timer" style="flex: 1; margin-bottom: 0;">▶ 2. BẮT ĐẦU TÍNH
                GIỜ</button>
        </div>
        <button class="btn btn-success" id="btn-reveal">🔍 3. CHẤM ĐIỂM (LẬT BÀI)</button>
        <button class="btn btn-purple" id="btn-leaderboard">🏆 4. HIỆN BẢNG XẾP HẠNG</button>
        <hr style="border-color: #34495e; margin: 15px 0;">
        <button class="btn btn-excel" id="btn-export">📥 XUẤT ĐIỂM EXCEL</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const roomCode = urlParams.get('room') || 'DEMO';
        document.getElementById('room-title').innerText = `🎛️ ĐIỀU KHIỂN - ${roomCode}`;

        const videoElement = document.getElementById('video'); const canvasElement = document.getElementById('canvas');
        const context = canvasElement.getContext('2d', { willReadFrequently: true }); const statusElement = document.getElementById('status');
        const socket = io(); const lastScannedTime = {}; let detector;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playBeepSound() { if (audioCtx.state === 'suspended') audioCtx.resume(); const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.type = 'square'; osc.frequency.setValueAtTime(880, audioCtx.currentTime); gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.1); osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.1); }
        function getAnswerFromCorners(corners) { let cx = (corners[0].x + corners[1].x + corners[2].x + corners[3].x) / 4; let cy = (corners[0].y + corners[1].y + corners[2].y + corners[3].y) / 4; let dx = corners[0].x - cx; let dy = corners[0].y - cy; if (dx < 0 && dy < 0) return 'A'; if (dx > 0 && dy < 0) return 'B'; if (dx > 0 && dy > 0) return 'C'; if (dx < 0 && dy > 0) return 'D'; return 'A'; }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } } });
                videoElement.srcObject = stream;
                videoElement.addEventListener('loadedmetadata', () => {
                    canvasElement.width = videoElement.videoWidth; canvasElement.height = videoElement.videoHeight;
                    detector = new AR.Detector(); statusElement.innerText = "Camera sẵn sàng! Hãy quét thẻ."; statusElement.style.color = "#4CAF50"; requestAnimationFrame(scanFrame);
                });
            } catch (error) { statusElement.innerText = "Lỗi Camera!"; statusElement.style.color = "#FF5252"; }
        }

        function scanFrame() {
            if (videoElement.readyState === videoElement.HAVE_ENOUGH_DATA) {
                context.drawImage(videoElement, 0, 0, canvasElement.width, canvasElement.height);
                const markers = detector.detect(context.getImageData(0, 0, canvasElement.width, canvasElement.height));
                if (markers.length > 0) {
                    context.lineWidth = 4;
                    for (let i = 0; i < markers.length; i++) {
                        let corners = markers[i].corners; context.strokeStyle = "#FF3D00"; context.beginPath();
                        for (let j = 0; j < corners.length; j++) { context.moveTo(corners[j].x, corners[j].y); context.lineTo(corners[(j + 1) % corners.length].x, corners[(j + 1) % corners.length].y); }
                        context.stroke(); context.closePath();
                        let currentAnswer = getAnswerFromCorners(corners); context.fillStyle = "#FFEB3B"; context.font = "bold 30px Arial"; context.fillText(`ID: ${markers[i].id} - [${currentAnswer}]`, corners[0].x, corners[0].y - 15);
                        let markerId = markers[i].id; const now = Date.now();
                        if (!lastScannedTime[markerId] || now - lastScannedTime[markerId] > 500) {
                            socket.emit('scanned_answer', { room: roomCode, studentId: markerId, answer: currentAnswer });
                            playBeepSound(); lastScannedTime[markerId] = now;
                        }
                    }
                }
            }
            requestAnimationFrame(scanFrame);
        }

        let questionBank = []; let activeQuestionOnBoard = null; let studentNamesList = [];
        let currentSubmissions = {}; let sessionResults = {}; let questionsAsked = [];

        window.onload = () => { startCamera(); };

        socket.on('connect', () => { socket.emit('join_room', roomCode); });

        // NHẬN DỮ LIỆU TỪ MÁY CHIẾU (LAPTOP) GỬI SANG
        socket.on('receive_sync_data', (data) => {
            questionBank = data.questions;
            studentNamesList = data.students;

            const selectEl = document.getElementById('question-select');
            selectEl.innerHTML = '<option value="">-- Chọn câu hỏi để bắn lên Tivi --</option>';
            questionBank.forEach((q, index) => {
                const opt = document.createElement('option'); opt.value = q.id;
                opt.innerText = `Câu ${index + 1}: ${q.text.substring(0, 30)}... (Đ/án: ${q.correct})`;
                selectEl.appendChild(opt);
            });

            statusElement.innerText = `✅ Đã nhận ${studentNamesList.length} Học sinh & ${questionBank.length} Câu hỏi từ Laptop!`;
            statusElement.style.backgroundColor = "#2ecc71"; statusElement.style.color = "white";
            setTimeout(() => { statusElement.innerText = "Camera sẵn sàng!"; statusElement.style.backgroundColor = "#333"; statusElement.style.color = "#4CAF50"; }, 4000);
        });

        socket.on('update_projector', (data) => { currentSubmissions[data.studentId] = data.answer; });

        document.getElementById('btn-push').addEventListener('click', () => {
            const qId = document.getElementById('question-select').value; if (!qId) return alert("Chọn 1 câu hỏi!");
            activeQuestionOnBoard = questionBank.find(x => x.id === qId); currentSubmissions = {};
            socket.emit('teacher_command', { room: roomCode, action: 'show_question', questionData: activeQuestionOnBoard });
        });

        document.getElementById('btn-start-timer').addEventListener('click', () => {
            if (!activeQuestionOnBoard) return alert("Phải bắn câu hỏi lên trước!");
            socket.emit('teacher_command', { room: roomCode, action: 'start_timer', duration: parseInt(document.getElementById('timer-duration').value) });
        });

        document.getElementById('btn-reveal').addEventListener('click', () => {
            if (!activeQuestionOnBoard) return alert("Chưa bắn câu hỏi!");
            if (!questionsAsked.find(q => q.id === activeQuestionOnBoard.id)) questionsAsked.push(activeQuestionOnBoard);
            const max = studentNamesList.length > 0 ? studentNamesList.length : 50;
            for (let i = 1; i <= max; i++) { if (!sessionResults[i]) sessionResults[i] = {}; sessionResults[i][activeQuestionOnBoard.id] = currentSubmissions[i] || 'Không nộp'; }
            socket.emit('teacher_command', { room: roomCode, action: 'reveal', correctAnswer: activeQuestionOnBoard.correct });
        });

        document.getElementById('btn-leaderboard').addEventListener('click', () => {
            if (questionsAsked.length === 0) return alert("Chưa có dữ liệu!");
            const leaderboard = []; const max = studentNamesList.length > 0 ? studentNamesList.length : 50;
            for (let i = 1; i <= max; i++) {
                let count = 0; questionsAsked.forEach(q => { if (sessionResults[i] && sessionResults[i][q.id] === q.correct) count++; });
                leaderboard.push({ id: i, name: studentNamesList[i - 1] || `Học sinh ID: ${i}`, score: count });
            }
            leaderboard.sort((a, b) => b.score - a.score);
            socket.emit('teacher_command', { room: roomCode, action: 'show_leaderboard', leaderboard: leaderboard });
        });

        document.getElementById('btn-export').addEventListener('click', () => {
            if (questionsAsked.length === 0) return alert("Chưa có dữ liệu!");
            const exportData = []; const max = studentNamesList.length > 0 ? studentNamesList.length : 50;
            for (let i = 1; i <= max; i++) {
                let row = { "ID Thẻ": i, "Họ và Tên": studentNamesList[i - 1] || `Học sinh ${i}` }; let count = 0;
                questionsAsked.forEach((q, idx) => {
                    const ans = (sessionResults[i] && sessionResults[i][q.id]) ? sessionResults[i][q.id] : 'Không nộp';
                    row[`Câu ${idx + 1} (Đ/A: ${q.correct})`] = ans; if (ans === q.correct) count++;
                });
                row["Số câu Đúng"] = `${count}/${questionsAsked.length}`; row["Điểm/10"] = ((count / questionsAsked.length) * 10).toFixed(1); exportData.push(row);
            }
            const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(exportData), "Diem");
            XLSX.writeFile(wb, `Diem_Lop_${roomCode}_${new Date().getTime()}.xlsx`);
        });
    </script>
</body>

</html>
