<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Máy Quét Đáp Án Học Sinh</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1e1e1e;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        #camera-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            border: 4px solid #4CAF50;
            border-radius: 8px;
            background-color: #000;
        }

        #video {
            width: 100%;
            display: block;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .status-bar {
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #333;
            border-radius: 5px;
            font-size: 16px;
            text-align: center;
            min-width: 300px;
        }

        #mock-btn {
            margin-top: 15px;
            padding: 12px 24px;
            background-color: #FF9800;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        #mock-btn:hover {
            background-color: #F57C00;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/gh/jcmellado/js-aruco/src/cv.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/jcmellado/js-aruco/src/aruco.js"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>

<body>

    <h2>Chế Độ Quét Thẻ</h2>

    <div id="camera-container">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
    </div>

    <div class="status-bar" id="status">Đang khởi động hệ thống...</div>

    <button id="mock-btn">🛠️ Giả lập quét Học sinh ID: 5 (Đáp án B)</button>

    <script>
        const videoElement = document.getElementById('video');
        const canvasElement = document.getElementById('canvas');
        const context = canvasElement.getContext('2d', { willReadFrequently: true });
        const statusElement = document.getElementById('status');
        const socket = io();
        const lastScannedTime = {};
        let detector;

        // [MỚI] KHỞI TẠO BỘ TỔNG HỢP ÂM THANH (WEB AUDIO API)
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        function playBeepSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.type = 'square'; // Tạo tiếng beep đanh, rõ
            oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); // Tần số nốt A5

            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime); // Âm lượng nhỏ vừa đủ
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.1); // Ngắt âm cực nhanh (0.1s)

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.1);
        }

        function getAnswerFromCorners(corners) {
            let cx = (corners[0].x + corners[1].x + corners[2].x + corners[3].x) / 4;
            let cy = (corners[0].y + corners[1].y + corners[2].y + corners[3].y) / 4;
            let dx = corners[0].x - cx; let dy = corners[0].y - cy;

            if (dx < 0 && dy < 0) return 'A';
            if (dx > 0 && dy < 0) return 'B';
            if (dx > 0 && dy > 0) return 'C';
            if (dx < 0 && dy > 0) return 'D';
            return 'A';
        }

        document.getElementById('mock-btn').addEventListener('click', () => {
            socket.emit('scanned_answer', { studentId: 5, answer: 'B' });
            playBeepSound(); // Phát âm thanh khi giả lập
            statusElement.innerText = "Đã GIẢ LẬP bắn dữ liệu ID: 5 (Chọn B) lên máy chiếu!";
            statusElement.style.color = "#FF9800";
        });

        async function startCamera() {
            try {
                const constraints = { video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } } };
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                videoElement.srcObject = stream;

                videoElement.addEventListener('loadedmetadata', () => {
                    canvasElement.width = videoElement.videoWidth;
                    canvasElement.height = videoElement.videoHeight;
                    detector = new AR.Detector();
                    statusElement.innerText = "Sẵn sàng kết nối! Hãy đưa thẻ vào camera.";
                    statusElement.style.color = "#4CAF50";
                    requestAnimationFrame(scanFrame);
                });
            } catch (error) {
                statusElement.innerText = "Lỗi: Không thể mở Camera. Vui lòng cấp quyền!";
                statusElement.style.color = "#FF5252";
            }
        }

        function scanFrame() {
            if (videoElement.readyState === videoElement.HAVE_ENOUGH_DATA) {
                context.drawImage(videoElement, 0, 0, canvasElement.width, canvasElement.height);
                const imageData = context.getImageData(0, 0, canvasElement.width, canvasElement.height);
                const markers = detector.detect(imageData);

                if (markers.length > 0) {
                    drawMarkers(markers);
                    statusElement.innerText = `Đang đồng bộ ${markers.length} thẻ lên máy chiếu...`;
                    statusElement.style.color = "#00E676";

                    const now = Date.now();
                    for (let i = 0; i < markers.length; i++) {
                        let markerId = markers[i].id;
                        let studentAnswer = getAnswerFromCorners(markers[i].corners);

                        if (!lastScannedTime[markerId] || now - lastScannedTime[markerId] > 500) {
                            socket.emit('scanned_answer', { studentId: markerId, answer: studentAnswer });
                            playBeepSound(); // [MỚI] Phát âm thanh báo hiệu quét thành công
                            lastScannedTime[markerId] = now;
                        }
                    }
                }
            }
            requestAnimationFrame(scanFrame);
        }

        function drawMarkers(markers) {
            context.lineWidth = 4;
            for (let i = 0; i < markers.length; i++) {
                let corners = markers[i].corners;
                context.strokeStyle = "#FF3D00"; context.beginPath();
                for (let j = 0; j < corners.length; j++) {
                    let corner = corners[j]; context.moveTo(corner.x, corner.y);
                    let nextCorner = corners[(j + 1) % corners.length]; context.lineTo(nextCorner.x, nextCorner.y);
                }
                context.stroke(); context.closePath();
                context.strokeStyle = "#00E676"; context.strokeRect(corners[0].x - 4, corners[0].y - 4, 8, 8);
                let currentAnswer = getAnswerFromCorners(corners);
                context.fillStyle = "#FFEB3B"; context.font = "bold 30px Arial";
                context.fillText(`ID: ${markers[i].id} - [${currentAnswer}]`, corners[0].x, corners[0].y - 15);
            }
        }

        window.onload = () => { startCamera(); };
    </script>
</body>

</html>
